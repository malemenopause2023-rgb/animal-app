<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐾 あなたは何の動物？診断</title>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Zen Maru Gothic', sans-serif;
      background: #fff9f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .bg-circles {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .bg-circles span {
      position: absolute;
      border-radius: 50%;
      opacity: 0.15;
      animation: float 6s infinite ease-in-out;
    }

    .bg-circles span:nth-child(1) { width: 200px; height: 200px; background: #ffb3c6; top: 10%; left: 5%; animation-delay: 0s; }
    .bg-circles span:nth-child(2) { width: 150px; height: 150px; background: #ffd6a5; top: 60%; left: 80%; animation-delay: 1s; }
    .bg-circles span:nth-child(3) { width: 100px; height: 100px; background: #caffbf; top: 80%; left: 20%; animation-delay: 2s; }
    .bg-circles span:nth-child(4) { width: 120px; height: 120px; background: #a0c4ff; top: 20%; left: 70%; animation-delay: 1.5s; }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-20px); }
    }

    .card {
      background: white;
      border-radius: 32px;
      padding: 48px 40px;
      max-width: 540px;
      width: 100%;
      box-shadow: 0 8px 40px rgba(255, 180, 150, 0.2);
      position: relative;
      z-index: 1;
      border: 3px solid #ffe0cc;
    }

    h1 {
      text-align: center;
      font-size: 2rem;
      font-weight: 900;
      color: #ff7b54;
      margin-bottom: 8px;
      line-height: 1.3;
    }

    .subtitle {
      text-align: center;
      color: #ffb085;
      font-size: 0.95rem;
      margin-bottom: 36px;
    }

    .progress-bar {
      background: #ffe8d6;
      border-radius: 99px;
      height: 10px;
      margin-bottom: 32px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #ff7b54, #ffb085);
      border-radius: 99px;
      transition: width 0.5s ease;
    }

    .question-num {
      font-size: 0.85rem;
      color: #ffb085;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .question-text {
      font-size: 1.2rem;
      font-weight: 700;
      color: #3d2b1f;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .option-btn {
      background: #fff9f5;
      border: 2.5px solid #ffe0cc;
      border-radius: 16px;
      padding: 16px 20px;
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: #3d2b1f;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: left;
    }

    .option-btn:hover {
      background: #fff0e6;
      border-color: #ff7b54;
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(255, 123, 84, 0.15);
    }

    .option-btn.selected {
      background: linear-gradient(135deg, #ff7b54, #ffb085);
      border-color: #ff7b54;
      color: white;
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(255, 123, 84, 0.3);
    }

    .next-btn {
      display: none;
      width: 100%;
      margin-top: 24px;
      padding: 18px;
      background: linear-gradient(135deg, #ff7b54, #ffb085);
      color: white;
      border: none;
      border-radius: 16px;
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 1.1rem;
      font-weight: 900;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 20px rgba(255, 123, 84, 0.3);
    }

    .next-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(255, 123, 84, 0.4);
    }

    .result-box {
      display: none;
      text-align: center;
    }

    .animal-emoji {
      font-size: 5rem;
      margin: 16px 0;
      animation: bounce 1s ease infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .animal-name {
      font-size: 2rem;
      font-weight: 900;
      color: #ff7b54;
      margin-bottom: 16px;
    }

    .animal-desc {
      font-size: 1rem;
      color: #5a4035;
      line-height: 1.8;
      background: #fff9f5;
      border-radius: 16px;
      padding: 20px;
      border: 2px solid #ffe0cc;
      white-space: pre-wrap;
    }

    .retry-btn {
      margin-top: 24px;
      padding: 16px 40px;
      background: white;
      color: #ff7b54;
      border: 2.5px solid #ff7b54;
      border-radius: 16px;
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 1rem;
      font-weight: 900;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .retry-btn:hover {
      background: #fff0e6;
      transform: translateY(-2px);
    }

    .loading {
      display: none;
      text-align: center;
      padding: 40px 0;
      font-size: 1.1rem;
      color: #ffb085;
      font-weight: 700;
    }

    .loading-emoji {
      font-size: 3rem;
      animation: spin 1s linear infinite;
      display: block;
      margin-bottom: 16px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="bg-circles">
    <span></span><span></span><span></span><span></span>
  </div>

  <div class="card">
    <h1>🐾 あなたは何の動物？</h1>
    <p class="subtitle">5つの質問に答えてね！</p>

    <div id="quiz-section">
      <div class="progress-bar">
        <div class="progress-fill" id="progress" style="width: 0%"></div>
      </div>

      <div class="question-num" id="q-num">質問 1 / 5</div>
      <div class="question-text" id="q-text"></div>
      <div class="options" id="options"></div>
      <button class="next-btn" id="next-btn" onclick="nextQuestion()">つぎへ →</button>
    </div>

    <div class="loading" id="loading">
      <span class="loading-emoji">🔮</span>
      あなたの動物を占い中...
    </div>

    <div class="result-box" id="result-box">
      <p style="color:#ffb085; font-weight:700; margin-bottom:8px;">あなたはこんな動物！</p>
      <div class="animal-emoji" id="animal-emoji"></div>
      <div class="animal-name" id="animal-name"></div>
      <div class="animal-desc" id="animal-desc"></div>
      <button class="retry-btn" onclick="restart()">もう一度やる 🔄</button>
    </div>
  </div>

  <script>
    const questions = [
      {
        text: "🌅 休日の朝、あなたはどう過ごす？",
        options: ["ゆっくり寝てのんびり", "早起きして活動的に", "友達に連絡してみる", "一人でじっくり趣味に没頭"]
      },
      {
        text: "🎉 友達のパーティーでのあなたは？",
        options: ["みんなを盛り上げる中心人物", "気の合う人とじっくり話す", "ひっそり観察している", "食べ物コーナーに直行！"]
      },
      {
        text: "😤 嫌なことがあったとき、どうする？",
        options: ["すぐ誰かに話す", "しばらく一人で考える", "気晴らしに体を動かす", "美味しいものを食べる"]
      },
      {
        text: "🌟 あなたの長所はどれに近い？",
        options: ["行動力がある", "思いやりがある", "冷静に物事を見られる", "マイペースで安定している"]
      },
      {
        text: "🌙 夜のあなたはどんな感じ？",
        options: ["夜更かしして活動的", "早めに寝て朝型", "その日の気分による", "夜中にいろいろ考えてしまう"]
      }
    ];

    let current = 0;
    let answers = [];
    let selectedOption = null;

    function showQuestion() {
      const q = questions[current];
      document.getElementById('q-num').textContent = `質問 ${current + 1} / 5`;
      document.getElementById('q-text').textContent = q.text;
      document.getElementById('progress').style.width = `${(current / 5) * 100}%`;

      const optionsEl = document.getElementById('options');
      optionsEl.innerHTML = '';
      selectedOption = null;
      document.getElementById('next-btn').style.display = 'none';

      q.options.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = opt;
        btn.onclick = () => selectOption(btn, opt);
        optionsEl.appendChild(btn);
      });
    }

    function selectOption(btn, value) {
      document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedOption = value;
      document.getElementById('next-btn').style.display = 'block';
    }

    function nextQuestion() {
      if (!selectedOption) return;
      answers.push(selectedOption);
      current++;

      if (current >= questions.length) {
        showLoading();
        getResult();
      } else {
        showQuestion();
      }
    }

    function showLoading() {
      document.getElementById('quiz-section').style.display = 'none';
      document.getElementById('loading').style.display = 'block';
    }

    async function getResult() {
      const res = await fetch('/api/animal', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ answers })
      });
      const data = await res.json();

      document.getElementById('loading').style.display = 'none';
      document.getElementById('result-box').style.display = 'block';
      document.getElementById('animal-emoji').textContent = data.emoji;
      document.getElementById('animal-name').textContent = data.animal;
      document.getElementById('animal-desc').textContent = data.description;
    }

    function restart() {
      current = 0;
      answers = [];
      selectedOption = null;
      document.getElementById('result-box').style.display = 'none';
      document.getElementById('quiz-section').style.display = 'block';
      document.getElementById('progress').style.width = '0%';
      showQuestion();
    }

    showQuestion();
  </script>
</body>
</html>
